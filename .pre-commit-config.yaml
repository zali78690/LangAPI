repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5  
    hooks:
      - id: ruff-format
      - id: ruff-check
        args: [--fix]
  - repo: local
    hooks:
      - id: pyright
        name: pyright
        entry: uv run pyright
        language: system
        types: [python]
