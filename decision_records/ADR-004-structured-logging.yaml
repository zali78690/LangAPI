ADR-004: Structured Logging with structlog
Status: Proposed
Context: >
  Production APIs need machine-parseable logs for monitoring and debugging.
  Challenge brief explicitly mentions monitoring as an assessment criterion.
Decision: >
  Use structlog with JSON output in production, ConsoleRenderer in debug mode.
Consequences:
  - Machine-parseable logs compatible with log aggregation tools
  - Context variables for request-scoped logging
  - ISO timestamps and log level filtering built in
Alternatives Rejected:
  - stdlib logging: unstructured output, harder to parse at scale
  - loguru: less suited for structured JSON output patterns in production
